{% extends "base.html" %}

{% block content %}
<div class="api-key-section" id="api-key-section">
    <h2>OpenAI APIキー設定</h2>
    <div id="api-key-status"></div>
    <div id="api-key-form" style="display:none;">
        <div class="api-key-input-group">
            <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off">
            <button type="button" id="api-key-submit" class="btn-primary">設定</button>
        </div>
        <p class="api-key-note" id="https-warning" style="display:none;">HTTPS接続ではないため、APIキーが傍受される可能性があります。</p>
        <p id="api-key-error" class="api-key-error" style="display:none;"></p>
    </div>
</div>

<div class="upload-section">
    <h2>音声ファイルをアップロード</h2>
    <form action="/api/upload" method="post" enctype="multipart/form-data" id="upload-form">
        <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="音声ファイルを選択するにはクリックまたはドラッグ＆ドロップ">
            <div class="drop-zone-content">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p>ファイルをドラッグ＆ドロップ<br>またはクリックして選択</p>
                <p class="file-types">対応形式: MP3, M4A, WAV, WebM, MP4, OGG, FLAC, AAC</p>
            </div>
            <input type="file" name="file" id="file-input" accept=".mp3,.m4a,.wav,.webm,.mp4,.ogg,.flac,.aac" required aria-label="音声ファイル">
        </div>
        <div id="file-info" class="file-info" style="display:none;">
            <span id="file-name"></span>
            <span id="file-size"></span>
        </div>
        <button type="submit" id="submit-btn" disabled>処理を開始</button>
    </form>
</div>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const submitBtn = document.getElementById('submit-btn');
const fileInfo = document.getElementById('file-info');
const fileName = document.getElementById('file-name');
const fileSize = document.getElementById('file-size');
const form = document.getElementById('upload-form');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        updateFileInfo(e.dataTransfer.files[0]);
    }
});

fileInput.addEventListener('change', () => {
    if (fileInput.files.length) {
        updateFileInfo(fileInput.files[0]);
    }
});

function updateFileInfo(file) {
    fileName.textContent = file.name;
    const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
    fileSize.textContent = `(${sizeMB} MB)`;
    fileInfo.style.display = 'flex';
    submitBtn.disabled = !hasApiKey;
}

form.addEventListener('submit', () => {
    submitBtn.disabled = true;
    submitBtn.textContent = 'アップロード中...';
});

// API Key management
const apiKeySection = document.getElementById('api-key-section');
const apiKeyStatus = document.getElementById('api-key-status');
const apiKeyForm = document.getElementById('api-key-form');
const apiKeyInput = document.getElementById('api-key-input');
const apiKeySubmitBtn = document.getElementById('api-key-submit');
const apiKeyError = document.getElementById('api-key-error');
const httpsWarning = document.getElementById('https-warning');
const banner = document.getElementById('api-key-banner');
let hasApiKey = false;

if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    httpsWarning.style.display = 'block';
}

async function loadApiKeyStatus() {
    try {
        const res = await fetch('/api/config/status');
        const data = await res.json();
        hasApiKey = data.has_key;
        renderApiKeyUI(data);
        updateSubmitButton();
    } catch(e) {}
}

function renderApiKeyUI(data) {
    if (data.source === 'env') {
        apiKeyStatus.innerHTML = '<span class="badge badge--success">APIキーは環境変数で設定済みです</span>';
        apiKeyForm.style.display = 'none';
        banner.style.display = 'none';
    } else if (data.source === 'web') {
        apiKeyStatus.innerHTML = '<span class="badge badge--success">APIキーが設定されています</span> <button type="button" id="api-key-clear" class="btn-danger-sm">キーを削除</button>';
        apiKeyForm.style.display = 'none';
        banner.style.display = 'none';
        document.getElementById('api-key-clear').addEventListener('click', clearApiKey);
    } else {
        apiKeyStatus.innerHTML = '<span class="badge badge--error">APIキーが設定されていません</span>';
        apiKeyForm.style.display = 'block';
        banner.className = 'api-key-banner api-key-banner--warning';
        banner.textContent = 'OpenAI APIキーが設定されていません。下のフォームから設定してください。';
        banner.style.display = 'block';
    }
}

function updateSubmitButton() {
    if (!hasApiKey) {
        submitBtn.disabled = true;
    } else if (fileInput.files.length > 0) {
        submitBtn.disabled = false;
    }
}

apiKeySubmitBtn.addEventListener('click', async () => {
    const key = apiKeyInput.value.trim();
    if (!key) return;
    apiKeyError.style.display = 'none';
    apiKeySubmitBtn.disabled = true;
    apiKeySubmitBtn.textContent = '確認中...';
    try {
        const res = await fetch('/api/config/api-key', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({api_key: key}),
        });
        const data = await res.json();
        if (!res.ok) {
            apiKeyError.textContent = data.error;
            apiKeyError.style.display = 'block';
        } else {
            apiKeyInput.value = '';
            await loadApiKeyStatus();
        }
    } catch(e) {
        apiKeyError.textContent = '接続エラーが発生しました';
        apiKeyError.style.display = 'block';
    } finally {
        apiKeySubmitBtn.disabled = false;
        apiKeySubmitBtn.textContent = '設定';
    }
});

apiKeyInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') apiKeySubmitBtn.click();
});

async function clearApiKey() {
    try {
        const res = await fetch('/api/config/api-key', {method: 'DELETE'});
        if (res.ok) await loadApiKeyStatus();
    } catch(e) {}
}

loadApiKeyStatus();
</script>
{% endblock %}
